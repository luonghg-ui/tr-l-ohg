<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đối Soát Sản Lượng Vender – Kho Thuocsi</title>
    <meta name="description" content="Hệ thống đối soát sản lượng vender, quản lý SKU và vi phạm thời gian thực.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
    <div class="mesh-bg"></div>

    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon"><i class='bx bx-check-shield'></i></div>
            <div class="brand-text">
                <h1>Đối Soát Vender</h1>
                <p>Quản lý sản lượng & vi phạm</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">
                <i class='bx bx-bot'></i>
                <span>Trợ Lý</span>
            </a>
            <a href="data-pa.html" class="nav-link">
                <i class='bx bx-table'></i>
                <span>PA</span>
            </a>
            <a href="data-missing.html" class="nav-link">
                <i class='bx bx-data'></i>
                <span>Missing</span>
            </a>
            <a href="doisoat.html" class="nav-link active">
                <i class='bx bx-shield-quarter'></i>
                <span>Đối Soát</span>
            </a>
            <a href="WH-WMS/mapping.html" class="nav-link">
                <i class='bx bx-building-house'></i>
                <span>WMS</span>
            </a>
            <a href="main/loacation.html" class="nav-link">
                <i class='bx bx-search-alt-2'></i>
                <span>Tra cứu nhanh</span>
            </a>
            <button class="btn-refresh-mini" id="refreshBtn" title="Làm mới dữ liệu">
                <i class='bx bx-refresh'></i>
            </button>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="reconcile-header">
            <h2 class="reconcile-title">Đối soát sản lượng của vender</h2>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button class="btn-export-global" id="exportAllBtn" title="Xuất Excel tất cả">
                    <i class='bx bxs-file-export'></i> Xuất excel
                </button>
                <button class="btn-refresh-cards" id="refreshCardsBtn"><i class='bx bx-sync'></i></button>
            </div>
        </div>

        <div class="vendor-grid" id="vendorGrid">
            <!-- Skeleton Cards -->
            <div class="vendor-card"><div class="stat-value">...</div></div>
            <div class="vendor-card"><div class="stat-value">...</div></div>
            <div class="vendor-card"><div class="stat-value">...</div></div>
        </div>

        <div class="toolbar" style="margin-top: 40px; margin-bottom: 20px;">
            <div class="search-wrap">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Nhập họ và tên nhân viên để tra cứu...">
            </div>
            <div class="result-badge" id="resultBadge">Sẵn sàng</div>
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width:120px;">Ngày</th>
                            <th>Họ và tên</th>
                            <th>Mã NV</th>
                            <th>Bộ phận</th>
                            <th>Ca làm</th>
                            <th>Sản lượng</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="padding:40px; text-align:center; color:var(--text-dim);">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-wrap" id="paginationWrap" style="display:none;">
                <div class="page-info" id="pageInfo"></div>
                <div class="page-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DETAIL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" style="max-width: 520px;">
            <button class="modal-close" id="modalCloseBtn"><i class='bx bx-x'></i></button>
            <div class="modal-body" style="padding: 28px 36px 36px;">
                <div id="reconcileDetailContent">
                    <!-- Dynamic Content injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <div id="statusBanner" style="display:none;">
        <div class="banner loading" id="bannerInner">
            <i class='bx bx-loader-alt bx-spin'></i>
            <span>Đang đồng bộ dữ liệu...</span>
        </div>
    </div>

    <script src="assets/js/script-doisoat.js?v=2"></script>
</body>

</html>
