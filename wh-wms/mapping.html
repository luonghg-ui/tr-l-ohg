<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS — Mapping Vị Trí Kệ</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="mesh-bg"></div>

    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon"><i class='bx bx-building-house'></i></div>
            <div class="brand-text">
                <h1>WMS Mapping</h1>
                <p>Quản lý vị trí kệ kho Hà Nội</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="../index.html" class="nav-link">
                <i class='bx bx-bot'></i>
                <span>Trợ Lý AI</span>
            </a>
            <a href="../data-pa.html" class="nav-link">
                <i class='bx bx-table'></i>
                <span>Data PA</span>
            </a>
            <a href="../data-missing.html" class="nav-link">
                <i class='bx bx-data'></i>
                <span>Missing</span>
            </a>
            <a href="../doisoat.html" class="nav-link">
                <i class='bx bx-shield-quarter'></i>
                <span>Đối Soát</span>
            </a>
            <a href="mapping.html" class="nav-link active">
                <i class='bx bx-map-pin'></i>
                <span>WMS Mapping</span>
            </a>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="card" style="max-width: 800px; margin: 0 auto; background: var(--surface-glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 32px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <h2 style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;">Tra cứu vị trí kệ</h2>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Nhập SKU để tìm vị trí lưu trữ chính xác trong kho</p>
            </div>

            <div class="options-row" style="display: flex; gap: 16px; margin-bottom: 24px;">
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em;">Hệ thống</label>
                    <select id="groupSel" class="filter-select" style="width: 100%;">
                        <option value="BUYMED" selected>BUYMED</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em;">Kho</label>
                    <select id="warehouseSel" class="filter-select" style="width: 100%;">
                        <option value="HN" selected>HN — Hà Nội</option>
                        <option value="HCM">HCM — Hồ Chí Minh</option>
                        <option value="DN">DN — Đà Nẵng</option>
                    </select>
                </div>
            </div>

            <div class="search-wrap" style="margin-bottom: 20px;">
                <i class='bx bx-search'></i>
                <input id="skuInput" type="text" placeholder="Nhập SKU... (VD: MEDX.GHKGEQ1P)" autocomplete="off" />
                <button class="btn-refresh" id="searchBtn" onclick="searchSingle()" style="position: absolute; right: 8px; top: 8px; padding: 6px 20px; height: 40px;">
                    <span>Tìm kiếm</span>
                </button>
            </div>

            <div class="history-row" id="historyRow" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;"></div>

            <div style="margin-bottom: 24px;">
                <span class="batch-toggle" onclick="toggleBatch()" style="color: var(--primary); font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    <i class='bx bx-list-plus'></i> Nhập nhiều SKU cùng lúc
                </span>
                <div id="batchArea" style="display: none; margin-top: 12px;">
                    <textarea id="batchInput" placeholder="Mỗi dòng 1 SKU..." style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 16px; color: #fff; padding: 16px; min-height: 120px; outline: none;"></textarea>
                    <button class="btn-sync" style="margin-top: 12px; width: 100%; justify-content: center;" onclick="searchBatch()">
                        <i class='bx bx-search-alt'></i> Tìm tất cả
                    </button>
                </div>
            </div>

            <div id="status" style="margin-bottom: 20px;"></div>
            <div id="results"></div>

            <div class="divider" style="height: 1px; background: var(--border); margin: 32px 0;"></div>
            
            <div class="settings-toggle" onclick="toggleSettings()" style="display: flex; align-items: center; justify-content: space-between; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border);">
                <span><i class='bx bx-cog'></i> Cài đặt token / proxy</span>
                <i class='bx bx-chevron-down' id="settingsArrow"></i>
            </div>
            
            <div id="settingsPanel" style="display: none; margin-top: 16px; padding: 20px; background: rgba(0,0,0,0.1); border-radius: 16px; border: 1px solid var(--border);">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px;">Proxy URL</label>
                    <input id="proxyUrl" type="text" value="http://localhost:3000" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 10px; font-family: monospace;" />
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px;">SID Token</label>
                    <input id="sidInput" type="text" placeholder="Paste SID token..." style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 10px; font-family: monospace;" />
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px;">Session Token</label>
                    <input id="tokenInput" type="text" placeholder="Paste session_token..." style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 10px; font-family: monospace;" />
                </div>
                <button class="btn-refresh" id="saveTokenBtn" onclick="saveToken()" style="width: 100%; justify-content: center;">
                    <i class='bx bx-save'></i> Lưu & cập nhật proxy
                </button>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem;">
        BuyMed WMS Assistant · Kho Hà Nội · <span id="clock"></span>
    </footer>

    <!-- MODAL SKU DETAIL -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-box" id="detailBox" style="max-width: 720px;">
            <div class="modal-header" id="detailHeader">
                <div class="modal-loading">Đang tải...</div>
            </div>
            <div class="modal-body" id="detailBody" style="padding: 30px;"></div>
        </div>
    </div>

    <script>
    const PROXY = () => document.getElementById('proxyUrl').value.trim().replace(/\/$/, '');
    let history_ = JSON.parse(localStorage.getItem('wms_sku_history') || '[]');
    let batchOpen = false;
    let settingsOpen = false;

    // Clock
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('vi-VN');
    }, 1000);

    // History chips
    function renderHistory() {
        const row = document.getElementById('historyRow');
        if (!history_.length) { row.innerHTML = ''; return; }
        row.innerHTML = history_.slice(0, 8).map(s =>
            `<span class="chip" onclick="document.getElementById('skuInput').value='${s}';searchSingle()" style="background: rgba(99, 102, 241, 0.1); color: var(--primary); border: 1px solid rgba(99, 102, 241, 0.2); padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;">${s}</span>`
        ).join('');
    }
    renderHistory();

    function addHistory(sku) {
        history_ = [sku, ...history_.filter(s => s !== sku)].slice(0, 20);
        localStorage.setItem('wms_sku_history', JSON.stringify(history_));
        renderHistory();
    }

    function toggleBatch() {
        batchOpen = !batchOpen;
        document.getElementById('batchArea').style.display = batchOpen ? 'block' : 'none';
    }

    function toggleSettings() {
        settingsOpen = !settingsOpen;
        document.getElementById('settingsPanel').style.display = settingsOpen ? 'block' : 'none';
        document.getElementById('settingsArrow').className = settingsOpen ? 'bx bx-chevron-up' : 'bx bx-chevron-down';
    }

    async function saveToken() {
        const sid = document.getElementById('sidInput').value.trim();
        const token = document.getElementById('tokenInput').value.trim();
        if (!sid || !token) { alert('Vui lòng nhập SID và Token'); return; }
        try {
            const r = await fetch(PROXY() + '/update-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sid, token })
            });
            const d = await r.json();
            alert(d.ok ? '✅ Cập nhật token thành công!' : '❌ Lỗi: ' + d.message);
        } catch(e) {
            alert('❌ Không kết nối được proxy: ' + e.message);
        }
    }

    function setStatus(msg) {
        const el = document.getElementById('status');
        if (!msg) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        el.innerHTML = `<div class="banner loading"><i class='bx bx-loader-alt bx-spin'></i><span>${msg}</span></div>`;
    }

    async function fetchMapping(sku) {
        const group = document.getElementById('groupSel').value;
        const warehouse = document.getElementById('warehouseSel').value;
        const url = `${PROXY()}/wms/mapping-location?sku=${encodeURIComponent(sku)}&group=${group}&warehouse=${warehouse}`;
        const r = await fetch(url);
        return r.json();
    }

    function isAllowedLocation(code) {
        if (!code) return false;
        const upper = code.toUpperCase();
        return upper.startsWith('I1A') || upper.startsWith('WH-LOST') || upper.startsWith('WH-MISSING');
    }

    function buildLocationCards(json) {
        const resListSKU = json.resListSKU;
        if (Array.isArray(resListSKU) && resListSKU.length > 0) {
            const allCards = [];
            for (const item of resListSKU) {
                const zone = item.zone || '';
                const locs = Array.isArray(item.locations) ? item.locations : [];
                if (!locs.length) {
                    allCards.push(`
                        <div class="loc-card" style="background: rgba(245, 158, 11, 0.05); border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 16px; padding: 16px; text-align: center;">
                            <div style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; color: #FCD34D;">—</div>
                            ${zone ? `<div style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px;">Zone: ${zone}</div>` : ''}
                            <div style="font-size: 0.7rem; color: #F87171; font-weight: 700; margin-top: 8px;">CHƯA CÓ KỆ</div>
                        </div>`);
                } else {
                    for (const loc of locs) {
                        const code = loc.code || loc.locationCode || '—';
                        if (!isAllowedLocation(code)) continue;

                        const qty  = loc.quantity != null ? loc.quantity : null;
                        const codeEsc = code.replace(/'/g, "\\'");
                        allCards.push(`
                            <div class="loc-card" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; padding: 16px; text-align: center; transition: all 0.3s; cursor: default;">
                                <div style="font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; color: #34D399;">${code}</div>
                                ${zone ? `<div style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px;">Zone: ${zone}</div>` : ''}
                                ${qty != null ? `<div style="font-size: 0.8rem; color: #FCD34D; font-weight: 700; margin-top: 8px;">Tồn: ${qty}</div>` : ''}
                                <button class="btn-refresh" onclick="copyLoc(this,'${codeEsc}')" style="margin-top: 12px; height: 32px; font-size: 0.7rem; padding: 0 12px; width: 100%; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border);">
                                    <i class='bx bx-copy'></i> Copy
                                </button>
                            </div>`);
                    }
                }
            }
            return allCards.length ? `<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 16px;">${allCards.join('')}</div>` : null;
        }

        const inv = json.inventoryLevel;
        if (Array.isArray(inv) && inv.length) {
            return inv.map(loc => {
                const code = loc.code || loc.locationCode || loc.name || '—';
                if (!isAllowedLocation(code)) return '';
                const codeEsc = code.replace(/'/g, "\\'");
                return `
                    <div class="loc-card" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; padding: 16px; text-align: center;">
                        <div style="font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; color: #34D399;">${code}</div>
                        <button class="btn-refresh" onclick="copyLoc(this,'${codeEsc}')" style="margin-top: 12px; height: 32px; font-size: 0.7rem; padding: 0 12px; width: 100%; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border);">
                            <i class='bx bx-copy'></i> Copy
                        </button>
                    </div>`;
            }).join('');
        }
        return null;
    }

    function renderResult(sku, json, idx=0) {
        const delay = idx * 0.07;
        let content = '';

        const firstItem = Array.isArray(json.resListSKU) && json.resListSKU[0];
        const productName = firstItem ? (firstItem.name || '') : '';
        const productImg  = firstItem ? (firstItem.imageUrl || '') : '';

        if (!json.ok) {
            content = `<div class="banner error" style="margin-top: 16px;"><i class='bx bx-error-circle'></i><span>Lỗi kết nối: ${json.message || 'Unknown'}</span></div>`;
        } else {
            const cards = buildLocationCards(json);
            if (cards) {
                content = cards;
            } else {
                content = `
                    <div style="text-align: center; padding: 40px; color: var(--text-dim);">
                        <i class='bx bx-package' style="font-size: 3rem; opacity: 0.2;"></i>
                        <p style="margin-top: 12px;">Chưa có vị trí kệ cho SKU này</p>
                    </div>`;
            }
        }

        const rawId = 'raw_' + sku.replace(/[^a-zA-Z0-9]/g,'_') + '_' + idx;
        const imgHtml = productImg ? `<img src="${productImg}" style="width:50px;height:50px;object-fit:cover;border-radius:12px;border:1px solid var(--border);background:#fff;padding:2px;margin-right:16px;flex-shrink:0" onerror="this.style.display='none'">` : '';
        
        return `
            <div class="result-item" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; animation: rowIn 0.5s ${delay}s both;">
                <div style="display:flex;align-items:center;margin-bottom:16px">
                    ${imgHtml}
                    <div style="flex:1">
                        <div style="font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px;">${productName || sku}</div>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--primary); background: rgba(99, 102, 241, 0.1); padding: 2px 8px; border-radius: 6px;">${sku}</span>
                            <button onclick="openSkuDetail('${sku}')" style="background:none; border:none; color:var(--accent); font-size:0.75rem; font-weight:700; cursor:pointer; text-decoration:underline;">Chi tiết SKU ➔</button>
                        </div>
                    </div>
                </div>
                ${content}
                <div style="margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; display: flex; justify-content: flex-end;">
                    <span class="raw-toggle" onclick="toggleRaw('${rawId}')" style="font-size: 0.7rem; color: var(--text-dim); cursor: pointer;">Dữ liệu gốc (JSON)</span>
                </div>
                <div id="${rawId}" class="raw-panel" style="display: none; margin-top: 12px; background: rgba(0,0,0,0.3); padding: 16px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; color: #7ee787; max-height: 200px; overflow: auto;">${JSON.stringify(json, null, 2)}</div>
            </div>`;
    }

    function toggleRaw(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function searchSingle() {
        const skuInput = document.getElementById('skuInput');
        const sku = skuInput.value.trim();
        if (!sku) return;
        
        setStatus(`Đang tra cứu vị trí kệ cho ${sku}...`);
        const resEl = document.getElementById('results');
        resEl.innerHTML = '';
        
        try {
            const data = await fetchMapping(sku);
            resEl.innerHTML = renderResult(sku, data);
            addHistory(sku);
        } catch(e) {
            resEl.innerHTML = `<div class="banner error"><i class='bx bx-error'></i><span>Lỗi: ${e.message}</span></div>`;
        } finally {
            setStatus(null);
        }
    }

    async function searchBatch() {
        const area = document.getElementById('batchInput');
        const skus = area.value.split('\n').map(s => s.trim()).filter(s => s.length > 3);
        if (!skus.length) { alert('Nhập ít nhất 1 SKU'); return; }

        setStatus(`Đang tra cứu ${skus.length} SKU...`);
        const resEl = document.getElementById('results');
        resEl.innerHTML = '';

        for (let i = 0; i < skus.length; i++) {
            const sku = skus[i];
            try {
                const data = await fetchMapping(sku);
                resEl.innerHTML += renderResult(sku, data, i);
            } catch(e) {
                resEl.innerHTML += `<div class="banner error"><span>Lỗi SKU ${sku}: ${e.message}</span></div>`;
            }
        }
        setStatus(null);
    }

    function copyLoc(btn, text) {
        navigator.clipboard.writeText(text);
        const oldText = btn.innerHTML;
        btn.innerHTML = `<i class='bx bx-check'></i> Đã copy!`;
        btn.style.color = '#34D399';
        btn.style.borderColor = '#34D399';
        setTimeout(() => {
            btn.innerHTML = oldText;
            btn.style.color = '';
            btn.style.borderColor = '';
        }, 1500);
    }

    // Modal SKU Detail
    async function openSkuDetail(sku) {
        const modal = document.getElementById('detailModal');
        const header = document.getElementById('detailHeader');
        const body = document.getElementById('detailBody');
        modal.classList.add('open');
        header.innerHTML = `<div style="display:flex; align-items:center; gap:16px; width:100%"><i class='bx bx-loader-alt bx-spin' style="font-size:2rem; color:var(--primary)"></i><div><div style="font-weight:700">Đang tải chi tiết...</div><div style="font-size:0.8rem; color:var(--text-dim)">${sku}</div></div></div>`;
        body.innerHTML = '';

        try {
            const r = await fetch(`${PROXY()}/wms/mapping-location?sku=${encodeURIComponent(sku)}&detail=true`);
            const d = await r.json();
            
            if (!d.ok) throw new Error(d.message);

            const first = d.resListSKU[0] || {};
            const name = first.name || sku;
            const img = first.imageUrl || '';

            header.innerHTML = `
                <img src="${img}" class="modal-product-img" onerror="this.style.display='none'">
                <div style="flex:1">
                    <h3 class="modal-product-name">${name}</h3>
                    <div style="display:flex; gap:8px;">
                        <span class="name-sku">${sku}</span>
                        <span style="font-size:0.7rem; color:var(--text-dim); background:rgba(255,255,255,0.05); padding:2px 8px; border-radius:6px;">Nhóm: ${first.groupName || '—'}</span>
                    </div>
                </div>
                <button class="modal-close" onclick="closeModal(null)"><i class='bx bx-x'></i></button>`;

            let statsHtml = `
                <div class="modal-key-fields">
                    <div class="modal-key-card accent-blue">
                        <div class="modal-key-label">Tổng Tồn</div>
                        <div class="modal-key-value">${first.totalQuantity || 0}</div>
                    </div>
                    <div class="modal-key-card accent-green">
                        <div class="modal-key-label">Khả dụng</div>
                        <div class="modal-key-value">${first.availableQuantity || 0}</div>
                    </div>
                    <div class="modal-key-card accent-yellow">
                        <div class="modal-key-label">Đang chờ</div>
                        <div class="modal-key-value">${first.pendingQuantity || 0}</div>
                    </div>
                </div>`;

            let locsHtml = '';
            if (first.locations && first.locations.length) {
                locsHtml = `
                    <div style="margin-top:24px;">
                        <div style="font-size:0.75rem; font-weight:800; color:var(--text-dim); text-transform:uppercase; margin-bottom:12px; letter-spacing:0.1em;">Danh sách vị trí kệ</div>
                        <div style="overflow-x:auto;">
                            <table style="width:100%; border-collapse:collapse;">
                                <thead>
                                    <tr>
                                        <th style="padding:12px; font-size:0.65rem;">Vị trí</th>
                                        <th style="padding:12px; font-size:0.65rem;">Số lượng</th>
                                        <th style="padding:12px; font-size:0.65rem;">Zone</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${first.locations.map(l => `
                                        <tr style="border-bottom:1px solid rgba(255,255,255,0.03);">
                                            <td style="padding:12px;"><span class="badge-shelf">${l.code}</span></td>
                                            <td style="padding:12px;"><span style="font-weight:700; color:#FCD34D;">${l.quantity}</span></td>
                                            <td style="padding:12px; color:var(--text-dim); font-size:0.8rem;">${first.zone || '—'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }

            body.innerHTML = statsHtml + locsHtml;
        } catch(e) {
            header.innerHTML = `<div style="color:#F87171; font-weight:700;">Lỗi khi tải chi tiết</div><button class="modal-close" onclick="closeModal(null)"><i class='bx bx-x'></i></button>`;
            body.innerHTML = `<div class="banner error"><span>${e.message}</span></div>`;
        }
    }

    function closeModal(e) {
        if (!e || e.target.id === 'detailModal' || e.target.closest('.modal-close')) {
            document.getElementById('detailModal').classList.remove('open');
        }
    }

    document.getElementById('skuInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchSingle();
    });
    </script>
</body>
</html>
