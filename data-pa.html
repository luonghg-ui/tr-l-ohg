<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kiểm Kê PA – Tra Cứu Tồn Kho</title>
    <meta name="description" content="Tra cứu dữ liệu kiểm kê kho PA – tìm kiếm theo SKU, tên sản phẩm, vị trí kệ.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #06B6D4;
            --bg: #030712;
            --surface: rgba(30, 41, 59, 0.6);
            --surface-glass: rgba(30, 41, 59, 0.4);
            --surface2: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.2);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --text-dim: #64748B;
            --radius-xl: 24px;
            --radius-lg: 18px;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ── MESH BACKGROUND ── */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 0.2) 0%, transparent 100%);
        }

        /* ── HEADER (GLASS) ── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 72px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            box-shadow: 0 8px 30px var(--primary-glow);
        }

        .brand-text h1 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .nav-link i {
            font-size: 18px;
            color: var(--primary);
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .btn-refresh.spinning i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ── MAIN LAYOUT ── */
        .page-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── STATS (BENTO) ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.06), transparent 40%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
            pointer-events: none;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: auto;
            position: relative;
            z-index: 1;
            transition: transform 0.4s;
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .stat-icon.blue {
            background: rgba(99, 102, 241, 0.1);
            color: #818CF8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2), inset 0 0 10px rgba(99, 102, 241, 0.1);
        }

        .stat-icon.green {
            background: rgba(16, 185, 129, 0.1);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .stat-icon.red {
            background: rgba(239, 68, 68, 0.1);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2), inset 0 0 10px rgba(239, 68, 68, 0.1);
        }

        .stat-icon.yellow {
            background: rgba(245, 158, 11, 0.1);
            color: #FCD34D;
            border: 1px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.2), inset 0 0 10px rgba(245, 158, 11, 0.1);
        }

        .stat-label {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 800;
            color: #F8FAFC;
            line-height: 1;
            position: relative;
            z-index: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* ── TOOLBAR ── */
        .toolbar {
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 20px;
        }

        .search-wrap input {
            width: 100%;
            padding: 14px 20px 14px 56px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .filter-select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 14px 20px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .result-badge {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 12px;
        }

        /* ── TABLE ── */
        .table-wrap {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .table-scroll {
            overflow: auto;
            max-height: 65vh;
        }

        .table-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(30, 41, 59, 0.95);
            padding: 18px 24px;
            text-align: left;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        thead th:hover {
            color: var(--primary);
        }

        .sort-icon {
            margin-left: 6px;
            opacity: 0.4;
            pointer-events: none;
        }

        th.asc .sort-icon,
        th.desc .sort-icon {
            opacity: 1;
            color: var(--primary);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.3s;
            cursor: pointer;
            animation: rowIn 0.5s calc(var(--i) * 0.05s) both;
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            padding: 16px 24px;
            vertical-align: middle;
            color: var(--text);
        }

        .td-img img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain;
            background: #fdfdfd;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3px;
        }

        .name-main {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .name-sku {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .badge-stock {
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 700;
            height: 32px;
            padding: 0 12px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-stock.in {
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-stock.out {
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-stock.low {
            background: rgba(245, 158, 11, 0.15);
            color: #FCD34D;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-shelf {
            font-family: var(--font-display);
            color: var(--primary);
            background: rgba(99, 102, 241, 0.12);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .td-unit {
            color: var(--text-muted);
            font-size: 0.82rem;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── MODAL (GLASS) ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            width: 100%;
            max-width: 680px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.open .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: flex-start;
            gap: 24px;
            position: relative;
        }

        .modal-product-img {
            width: 84px;
            height: 84px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px;
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .modal-title-wrap {
            flex: 1;
            padding-right: 55px;
        }

        .modal-product-name {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #94A3B8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-body::-webkit-scrollbar {
            width: 5px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .modal-key-fields {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .modal-key-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .modal-key-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% {
                left: 200%;
            }
        }

        .modal-key-card:hover {
            transform: translateY(-4px);
        }

        .modal-key-card.accent-red {
            border-color: rgba(239, 68, 68, 0.4);
            background: radial-gradient(circle at bottom, rgba(239, 68, 68, 0.15), transparent 70%);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.2), inset 0 2px 20px rgba(239, 68, 68, 0.1);
        }

        .modal-key-card.accent-green {
            border-color: rgba(16, 185, 129, 0.4);
            background: radial-gradient(circle at bottom, rgba(16, 185, 129, 0.15), transparent 70%);
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.2), inset 0 2px 20px rgba(16, 185, 129, 0.1);
        }

        .modal-key-card.accent-yellow {
            border-color: rgba(245, 158, 11, 0.4);
            background: radial-gradient(circle at bottom, rgba(245, 158, 11, 0.15), transparent 70%);
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.2), inset 0 2px 20px rgba(245, 158, 11, 0.1);
        }

        .modal-key-card.accent-blue {
            border-color: rgba(99, 102, 241, 0.4);
            background: radial-gradient(circle at bottom, rgba(99, 102, 241, 0.15), transparent 70%);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2), inset 0 2px 20px rgba(99, 102, 241, 0.1);
        }

        .modal-key-label {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .modal-key-value {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .modal-breakdown-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .modal-breakdown-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .modal-breakdown-table th {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            text-align: left;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .modal-breakdown-table td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: #fff;
        }

        .modal-breakdown-table tr:last-child td {
            border-bottom: none;
        }

        .br-shelf {
            color: #818CF8;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .br-stock {
            color: #34D399;
            font-weight: 800;
            font-family: var(--font-display);
            font-size: 1rem;
        }

        /* ── LOT CARD GRID UI ── */
        .lot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .lot-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 16px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .lot-card:hover {
            transform: translateY(-3px);
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .lot-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .lot-card .loc-badge {
            font-size: 0.7rem;
            color: #818CF8;
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lot-card .qty-badge {
            font-size: 1rem;
            font-weight: 800;
            color: #34D399;
            font-family: var(--font-display);
        }

        .lot-info-val {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lot-info-val .label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .lot-info-val .value {
            font-size: 0.85rem;
            color: #fff;
            font-weight: 600;
        }

        .expiry-pip {
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, transparent 50%, rgba(52, 211, 153, 0.2) 50%);
        }

        .lot-card.exp-near .expiry-pip {
            background: linear-gradient(135deg, transparent 50%, rgba(245, 158, 11, 0.2) 50%);
        }

        .lot-card.exp-critical .expiry-pip {
            background: linear-gradient(135deg, transparent 50%, rgba(239, 68, 68, 0.2) 50%);
        }

        .lot-status-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            margin-top: 8px;
            display: inline-block;
        }

        .status-fresh {
            background: rgba(16, 185, 129, 0.1);
            color: #34D399;
        }

        .status-near {
            background: rgba(245, 158, 11, 0.1);
            color: #FCD34D;
        }

        .status-critical {
            background: rgba(239, 68, 68, 0.1);
            color: #F87171;
        }

        /* ── PREVIEW BADGE IN MAIN TABLE ── */
        .multi-lot-hint {
            font-size: 0.65rem;
            background: rgba(99, 102, 241, 0.1);
            color: #818CF8;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: 700;
        }

        /* ── UTILS ── */
        #statusBanner {
            margin-bottom: 24px;
        }

        .banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .banner.loading {
            background: rgba(99, 102, 241, 0.1);
            color: #C7D2FE;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .banner.error {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        mark {
            background: rgba(245, 158, 11, 0.3);
            color: #FCD34D;
            border-radius: 3px;
            padding: 0 2px;
        }

        .pagination-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
        }

        .page-info {
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .page-info b {
            color: #fff;
        }

        .page-btns {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ── TABLET ── */
        @media (max-width: 768px) {
            .top-bar {
                padding: 10px 16px;
                min-height: auto;
            }

            .brand-text p {
                display: none;
            }

            .nav-link span {
                display: none;
            }

            .nav-link {
                padding: 9px 12px;
            }

            .btn-refresh span {
                display: none;
            }

            .btn-refresh {
                padding: 9px 12px;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

            .stat-value {
                font-size: 2.2rem;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .page-wrapper {
                padding: 20px 14px;
            }
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .top-bar {
                padding: 8px 12px;
                gap: 6px;
            }

            .brand-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .brand-text h1 {
                font-size: 1rem;
            }

            .header-nav {
                gap: 6px;
            }

            .nav-link {
                padding: 8px 10px;
                border-radius: 10px;
            }

            .nav-link i {
                font-size: 16px;
            }

            .btn-refresh {
                padding: 8px 10px;
                border-radius: 10px;
                gap: 0;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 18px 14px;
                min-height: 140px;
            }

            .stat-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .stat-label {
                font-size: 0.65rem;
            }

            .toolbar {
                padding: 16px;
                gap: 10px;
            }

            .table-scroll {
                max-height: 55vh;
            }

            .modal-key-fields {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .modal-key-value {
                font-size: 2rem;
            }

            .modal-product-name {
                font-size: 1.1rem;
            }

            .modal-box {
                max-width: 100%;
                border-radius: 20px;
            }

            .page-wrapper {
                padding: 14px 10px;
            }
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>

    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon"><i class='bx bx-package'></i></div>
            <div class="brand-text">
                <h1>Data Kiểm Kê PA</h1>
                <p>Quản lý kho thời gian thực</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">
                <i class='bx bx-bot'></i>
                <span>Trợ Lý AI</span>
            </a>
            <a href="data-missing.html" class="nav-link">
                <i class='bx bx-data'></i>
                <span>Data Missing</span>
            </a>
            <button class="btn-refresh" id="refreshBtn">
                <i class='bx bx-refresh'></i>
                <span>Làm mới</span>
            </button>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue"><i class='bx bx-data'></i></div>
                <div class="stat-label">Tổng Sản Phẩm</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class='bx bx-check-double'></i></div>
                <div class="stat-label">Còn Hàng</div>
                <div class="stat-value" id="statInStock">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class='bx bx-error-alt'></i></div>
                <div class="stat-label">Hết Hàng</div>
                <div class="stat-value" id="statOutStock">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon yellow"><i class='bx bx-map-pin'></i></div>
                <div class="stat-label">Đã Xếp Kệ</div>
                <div class="stat-value" id="statShelved">—</div>
            </div>
        </div>

        <div id="statusBanner" style="display:none;">
            <div class="banner loading" id="bannerInner">
                <i class='bx bx-loader-alt bx-spin'></i>
                <span>Đang đồng bộ dữ liệu...</span>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Tìm theo SKU, tên sản phẩm hoặc vị trí kệ..." disabled>
            </div>
            <select class="filter-select" id="stockFilter" disabled>
                <option value="all">Tất cả trạng thái</option>
                <option value="in">Còn hàng</option>
                <option value="out">Hết hàng</option>
                <option value="low">Tồn thấp (≤10)</option>
            </select>
            <select class="filter-select" id="shelfFilter" disabled>
                <option value="all">Tất cả vị trí</option>
            </select>
            <div class="result-badge" id="resultBadge">Sẵn sàng</div>
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width:50px; text-align:center;">#</th>
                            <th style="width:60px;"></th>
                            <th data-col="name" id="thName">Sản phẩm / SKU <i class='bx bx-sort-alt-2 sort-icon'></i>
                            </th>
                            <th data-col="stock" id="thStock">Tồn Kho <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th style="width:100px;">Số lượng</th>
                            <th data-col="shelf" id="thShelf">Vị Trí Kệ <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th>Quy Cách</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="skeleton-row">
                            <td colspan="6" style="padding:100px; text-align:center; color:var(--text-dim);">Đang tải dữ
                                liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-wrap" id="paginationWrap" style="display:none;">
                <div class="page-info" id="pageInfo"></div>
                <div class="page-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DETAIL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <button class="modal-close" id="modalCloseBtn"><i class='bx bx-x'></i></button>
            <div class="modal-header" id="modalHeader"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="script-pa.js"></script>
</body>

</html>
