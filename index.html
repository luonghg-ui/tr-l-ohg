<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Kho Hàng Thuocsi</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="chatbot-container">
        <header class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">
                    <i class='bx bx-bot'></i>
                </div>
                <div class="bot-details">
                    <h1>Trợ Lý Kho Hàng</h1>
                    <span class="status"><span class="status-dot"></span> Đang trực tuyến (Sẵn sàng tra cứu)</span>
                </div>
            </div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 10px;">
                <a href="data-pa.html" class="nav-btn">
                    <i class='bx bx-table'></i>
                    <span>Data PA</span>
                </a>
                <a href="data-missing.html" class="nav-btn">
                    <i class='bx bx-data'></i>
                    <span>Data Missing</span>
                </a>
                <button class="nav-btn-icon" id="refreshDataBtn" title="Tải lại dữ liệu">
                    <i class='bx bx-refresh'></i>
                </button>
            </div>
        </header>

        <style>
            .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
            .nav-btn {
                text-decoration: none; font-size: 0.8rem; font-weight: 700; color: #4F46E5;
                background: linear-gradient(135deg, rgba(79,70,229,0.1), rgba(79,70,229,0.05));
                border: 1px solid rgba(79,70,229,0.2); border-radius: 12px; padding: 10px 14px;
                display: flex; align-items: center; gap: 6px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 4px 10px rgba(0,0,0,0.02); white-space: nowrap;
            }
            .nav-btn:hover {
                transform: translateY(-2px);
                background: #4F46E5; color: #fff;
                box-shadow: 0 8px 20px rgba(79,70,229,0.3);
            }
            .nav-btn i { font-size: 18px; }
            .nav-btn-icon {
                background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b;
                width: 38px; height: 38px; border-radius: 12px;
                display: flex; align-items: center; justify-content: center; font-size: 20px;
                cursor: pointer; transition: all 0.3s; flex-shrink: 0;
            }
            .nav-btn-icon:hover { background: #e2e8f0; color: #0f172a; transform: rotate(90deg); }

            /* ── Responsive: ẩn text, chỉ giữ icon trên mobile ── */
            @media (max-width: 480px) {
                .header-actions { gap: 6px; }
                .nav-btn { padding: 9px 10px; gap: 0; border-radius: 10px; }
                .nav-btn span { display: none; }
                .nav-btn i { font-size: 20px; }
                .nav-btn-icon { width: 34px; height: 34px; font-size: 18px; border-radius: 10px; }
            }
        </style>

        <main class="chat-body" id="chatBody">
            <div class="message bot-message">
                <div class="message-content">
                    <p>Xin chào! Dữ liệu đang được tải về từ hệ thống...</p>
                    <div class="typing-indicator" id="typingIndicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="chat-footer">
            <form id="chatForm" autocomplete="off">
                <div class="input-container">
                    <i class='bx bx-search search-icon'></i>
                    <input type="text" id="userInput" placeholder="Nhập MÃ SKU hoặc Tên sản phẩm..." disabled>
                    <button type="submit" id="sendBtn" class="send-btn" disabled>
                        <i class='bx bx-send'></i>
                    </button>
                </div>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
